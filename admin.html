<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Boris Web Studio</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <header>
    <div class="logo">Boris Web Studio</div>

    <nav>
      <a href="index.html">Home</a>
      <a href="index.html#services">Services</a>
    </nav>
  </header>

  <main class="admin-page">
    <section id="admin">
      <h2>Admin панел</h2>

      <form class="admin-login" id="adminLogin">
        <h3>Вход за админ</h3>
        <label>
          Парола
          <input type="password" id="adminPassword" autocomplete="current-password" placeholder="Въведи парола">
        </label>
        <button type="submit">Отключи панела</button>
        <p class="admin-status" id="passwordStatus" aria-live="polite"></p>
      </form>

      <div class="admin-panel is-hidden" id="adminPanel">
        <div class="admin-intro">
          <h3>Отстъпки</h3>
          <p>Въведи процент отстъпка за всяка услуга. Цените се обновяват на сайта и се запазват в този браузър.</p>
        </div>

        <form class="discount-form" id="discountForm">
          <div class="discount-item" data-admin-service="cs2" data-admin-price="4">
            <h4>CS 2</h4>
            <label>
              Отстъпка %
              <input type="number" min="0" max="100" step="1" name="cs2" value="0">
            </label>
            <label>
              Срок
              <select name="cs2Duration">
                <option value="">Без срок</option>
                <option value="1 ден">1 ден</option>
                <option value="1 седмица">1 седмица</option>
                <option value="1 месец">1 месец</option>
                <option value="custom">Друго</option>
              </select>
            </label>
            <input class="custom-duration is-hidden" type="text" name="cs2CustomDuration" placeholder="Например: до петък">
            <p class="price-preview" data-price-preview="cs2">Нова цена: 4 €</p>
          </div>

          <div class="discount-item" data-admin-service="minecraft" data-admin-price="6">
            <h4>Minecraft Server</h4>
            <label>
              Отстъпка %
              <input type="number" min="0" max="100" step="1" name="minecraft" value="0">
            </label>
            <label>
              Срок
              <select name="minecraftDuration">
                <option value="">Без срок</option>
                <option value="1 ден">1 ден</option>
                <option value="1 седмица">1 седмица</option>
                <option value="1 месец">1 месец</option>
                <option value="custom">Друго</option>
              </select>
            </label>
            <input class="custom-duration is-hidden" type="text" name="minecraftCustomDuration" placeholder="Например: 3 дни">
            <p class="price-preview" data-price-preview="minecraft">Нова цена: 6 €</p>
          </div>

          <div class="discount-item" data-admin-service="custom" data-admin-price="10">
            <h4>Сайт по избор</h4>
            <label>
              Отстъпка %
              <input type="number" min="0" max="100" step="1" name="custom" value="0">
            </label>
            <label>
              Срок
              <select name="customDuration">
                <option value="">Без срок</option>
                <option value="1 ден">1 ден</option>
                <option value="1 седмица">1 седмица</option>
                <option value="1 месец">1 месец</option>
                <option value="custom">Друго</option>
              </select>
            </label>
            <input class="custom-duration is-hidden" type="text" name="customCustomDuration" placeholder="Например: само тази седмица">
            <p class="price-preview" data-price-preview="custom">Нова цена: 10 €</p>
          </div>

          <div class="admin-actions">
            <button type="submit">Запази отстъпките</button>
            <button type="button" class="ghost-button" id="resetDiscounts">Изчисти</button>
            <button type="button" class="ghost-button" id="lockAdmin">Изход</button>
          </div>

          <p class="admin-status" id="adminStatus" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
